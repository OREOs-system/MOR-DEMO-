<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="signup.css">
    <title>Register</title>
</head>
<body>
    <section class="menu">
        <div class="nav">
            <div class="logo"><h1>MC<b>Caffe</b></h1></div>
            <ul>
                <li><a href="index.html" class="home-active">Home</a></li>
            </ul>
        </div>
    </section>
    <div class="register-container">
        <h2>Create an Account</h2>
        <form id="registerForm" class="register-form">
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" placeholder="Enter your username" required />
            </div>
            <div class="form-group">
                <label for="email">Email Address:</label>
                <input type="email" id="email" placeholder="Enter your email" required />
            </div>
            <div class="form-group">
                <label for="address">Street Address:</label>
                <input type="text" id="address" placeholder="Enter your street address" required />
            </div>
            <div class="form-group">
                <label for="city">City:</label>
                <input type="text" id="city" placeholder="Enter your city" required />
            </div>
            <div class="form-group">
                <label for="zipCode">Zip Code:</label>
                <input type="text" id="zipCode" placeholder="Enter your zip code" required />
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="Create a password" required />
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password:</label>
                <input type="password" id="confirmPassword" placeholder="Confirm your password" required />
            </div>
            <button type="submit" id="registerBtn">Sign Up</button>
            <p>Already have an account? <a href="login.html">Login</a></p>
        </form>
        <p id="error-message" class="error-message"></p>
    </div>

    <script src="signup.js"></script>
</body>
</html>
