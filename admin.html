<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Orders</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <script src="admin.js" defer></script>
</head>
<body>
    <div class="navbar">
        <div>MC Caffe</div>
    </div>
    <main class="admin-page">
        <h1>Admin Panel</h1>
        <div class="admin-nav">
            <a href="admin.html" class="admin-link active">📦 Orders</a>
            <a href="users.html" class="admin-link">👥 Users</a>
            <a href="#" class="admin-link" onclick="showAccountViewer()">👤 View Account</a>
        </div>
        <div class="admin-actions">
            <button class="btn-clear-history" onclick="clearTransactionHistory()">🗑️ Clear Transaction History</button>
        </div>
        <div id="account-viewer" style="display: none;">
            <h2>View User Account</h2>
            <select id="user-select"></select>
            <button onclick="loadUserAccount()">Load Account</button>
            <div id="user-account-info"></div>
        </div>
        <div id="orders-list"></div>
    </main>
</body>
</html>
