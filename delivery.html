<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- custom css file link  -->
    <link rel="stylesheet" href="delivery.css">
</head>
<body>

    <section class="menu">
        <div class="nav">
            <div class="logo"><h1>MC<b>Caffe</b></h1></div>
            <ul>
                <li><a href="index.html" class="home-active">Home</a></li>
            </ul>
        </div>
    </section>

    <div class="container">
        <form onsubmit="saveDeliveryAddress(event)">
            <div class="row">
                <div class="col">
                    <h3 class="title"> Delivery address</h3>

                    <div class="inputBox">
                        <span>full name :</span>
                        <input type="text" id="deliveryFullName" placeholder="john deo" required>
                    </div>
                    <div class="inputBox">
                        <span>email :</span>
                        <input type="email" id="deliveryEmail" placeholder="example@example.com" required>
                    </div>
                    <div class="inputBox">
                        <span>address :</span>
                        <input type="text" id="deliveryAddress" placeholder="Blk - street - locality" required>
                    </div>
                    <div class="inputBox">
                        <span>city :</span>
                        <input type="text" id="deliveryCity" placeholder="" required>
                    </div>

                    <div class="flex">
                        <div class="inputBox">
                            <span>state :</span>
                            <input type="text" id="deliveryState" value="Philippines" required>
                        </div>
                        <div class="inputBox">
                            <span>zip code :</span>
                            <input type="text" id="deliveryZip" placeholder="123 456" required>
                        </div>
                    </div>

                    <div class="map-box">
                        <h4>Your delivery location</h4>
                        <iframe id="deliveryMap" src="https://www.google.com/maps?q=Philippines&output=embed" loading="lazy"></iframe>
                    </div>
                </div>

                <div class="col">
                    <h3 class="title">payment</h3>

                    <div class="inputBox">
                        <span>cards accepted :</span>
                        <img src="card_img.png" alt="">
                    </div>
                    <div class="inputBox">
                        <span>name on card :</span>
                        <input type="text" placeholder="mr. john deo">
                    </div>
                    <div class="inputBox">
                        <span>credit card number :</span>
                        <input type="number" placeholder="1111-2222-3333-4444">
                    </div>

                    <!-- Add a section for COD option -->
                    <div class="inputBox">
                        <label for="cod">
                            <input type="radio" id="cod" name="payment_method" value="COD" checked> Cash on Delivery
                        </label>
                    </div>
                </div>
            </div>

            <input type="submit" value="proceed to checkout" class="submit-btn">
        </form>
    </div>

    <script src="delivery.js"></script>
</body>
</html>
