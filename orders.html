<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders</title>
    <link rel="stylesheet" href="orders.css">
    <link rel="stylesheet" href="menu.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
</head>
<body>
    <!-- Navbar -->
    <div class="navbar">
        <div>MC Caffe</div>
        <div class="menu-icon">
            <a href="mainpage.html"><i class="bi bi-house-door"></i>Home</a>
        </div>
    </div>

    <div class="container">
        <h1>Order Status Tracker</h1>
        
        <div id="orderMessage" class="welcome-message">
            <!-- Message shown after checkout -->
        </div>

        <!-- Order Status Section -->
        <div class="orders-section">
            <h2>All Your Orders</h2>
            <div id="ordersList" class="orders-list">
                <!-- Orders will be displayed here dynamically -->
            </div>
        </div>

        <!-- Navigation Buttons -->
        <div class="button-group">
            <button onclick="goHome()" class="btn-home">Back to Home</button>
            <button onclick="goCart()" class="btn-cart">Continue Shopping</button>
        </div>
    </div>

    <script src="orders.js"></script>
</body>
</html>
