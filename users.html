<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - User Management</title>
    <link rel="stylesheet" href="users.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <script src="users.js" defer></script>
</head>
<body>
    <div class="navbar">
        <div class="navbar-brand">MC Caffe - User Management</div>
        <div class="navbar-links">
            <a href="admin.html" class="nav-link">📦 Orders</a>
            <a href="users.html" class="nav-link active">👥 Users</a>
            <a href="aadmin.html" class="nav-link">🏠 Log out</a>
        </div>
    </div>

    <main class="admin-page">
        <div class="header-section">
            <h1>User Management</h1>
            <div class="action-buttons">
                <button class="btn-primary" onclick="openAddUserModal()">+ Add New User</button>
                <button class="btn-secondary" onclick="refreshUsers()">🔄 Refresh</button>
                <button class="btn-danger" onclick="resetDatabase()">⚠️ Reset Database</button>
            </div>
        </div>

        <div class="stats-section">
            <div class="stat-card">
                <div class="stat-number" id="totalUsers">0</div>
                <div class="stat-label">Total Users</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="activeUsers">0</div>
                <div class="stat-label">Active Users</div>
            </div>
        </div>

        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Search by name or email..." class="search-box">
            <select id="filterRole" class="filter-select">
                <option value="all">All Roles</option>
                <option value="user">Regular User</option>
                <option value="admin">Admin</option>
            </select>
        </div>

        <div class="users-container" id="usersList"></div>

        <a href="admin.html" class="back-btn">← Back to Admin Panel</a>
    </main>

    <!-- Add/Edit User Modal -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeUserModal()">&times;</span>
            <h2 id="modalTitle">Add New User</h2>
            <form id="userForm" onsubmit="saveUser(event)">
                <div class="form-group">
                    <label for="modalFirstName">First Name:</label>
                    <input type="text" id="modalFirstName" required>
                </div>
                <div class="form-group">
                    <label for="modalLastName">Last Name:</label>
                    <input type="text" id="modalLastName" required>
                </div>
                <div class="form-group">
                    <label for="modalEmail">Email:</label>
                    <input type="email" id="modalEmail" required>
                </div>
                <div class="form-group">
                    <label for="modalPhone">Phone:</label>
                    <input type="text" id="modalPhone">
                </div>
                <div class="form-group">
                    <label for="modalAddress">Address:</label>
                    <input type="text" id="modalAddress">
                </div>
                <div class="form-group">
                    <label for="modalCity">City:</label>
                    <input type="text" id="modalCity">
                </div>
                <div class="form-group">
                    <label for="modalZipCode">Zip Code:</label>
                    <input type="text" id="modalZipCode">
                </div>
                <div class="form-group">
                    <label for="modalPassword">Password:</label>
                    <input type="password" id="modalPassword" required>
                </div>
                <div class="form-group">
                    <label for="modalRole">Role:</label>
                    <select id="modalRole">
                        <option value="customer">Customer</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="modalProfilePic">Profile Picture URL:</label>
                    <input type="text" id="modalProfilePic" placeholder="https://...">
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-save">Save User</button>
                    <button type="button" class="btn-cancel" onclick="closeUserModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- View User Details Modal -->
    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeDetailsModal()">&times;</span>
            <div id="userDetails"></div>
        </div>
    </div>
</body>
</html>
