<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings</title>
    <link rel="stylesheet" href="account.css">
</head>
<body>
    <div class="container">
        <h1>Account Settings</h1>
        
        <!-- Account Information Section -->
        <div class="section">
            <h2>Account Information</h2>
            <p>Username: <span id="usernameDisplay"></span> <button onclick="editUsername()">Edit</button></p>
            <p>Email: <span id="emailDisplay"></span> <button onclick="editEmail()">Edit</button></p>
            <p>Profile Picture: <img id="profilePic" src="default-profile.png" alt="Profile Picture" width="50"> <button onclick="changePicture()">Change Picture</button></p>
        </div>

        <!-- Password Management Section -->
        <div class="section">
            <h2>Password Management</h2>
            <label for="currentPassword">Current Password:</label>
            <input type="password" id="currentPassword" placeholder="Enter your current password">
            <label for="newPassword">New Password:</label>
            <input type="password" id="newPassword" placeholder="Enter new password">
            <label for="confirmPassword">Confirm New Password:</label>
            <input type="password" id="confirmPassword" placeholder="Confirm new password">
            <button onclick="changePassword()">Change Password</button>
        </div>

        <!-- Logout Button -->
        <div class="section">
            <button onclick="logout()">Logout</button>
        </div>

        <!-- Order History Section -->
        <div class="section">
            <h2>Order History</h2>
            <div id="orderHistory"></div>
        </div>
    </div>

    <script src="account.js"></script>
</body>
</html>
